<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community</title>
    <link rel="stylesheet" href="./comm.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>
    <!-- COMMUNITY OUTREACH SECTION -->
<section class="outreach-section">

  <div class="section-header">

    <h2 class="section-tr">
      Transforming Communities <br>
      Through Action & <br>
      Participation
    </h2>

    <p class="section-description">
      Empowering lives through community participation and support,
      youth development,cultural sense of belonging and
      impactful community initiatives.
    </p>

  </div>

<!-- OUTREACH GALLERY SECTION -->

<section class="gallery-section">

  <div class="gallery-header">

    <h2>
      Active Community Participation
    </h2>

  </div>

  <div class="gallery-container">

    <!-- LEFT BUTTON -->

    <button class="gallery-btn prev">
      <i class="fa-solid fa-chevron-left"></i>
    </button>

    <!-- IMAGE -->

    <div class="gallery-image">

      <img
        id="sliderImage"
        src="./gallery1.jpeg"
        alt=""
      />

    </div>

    <!-- RIGHT BUTTON -->

    <button class="gallery-btn next">
      <i class="fa-solid fa-chevron-right"></i>
    </button>

  </div>

</section>

<section class="gallery-section">

  <div class="gallery-header">

    <h2>
      Achievements & Rewards
    </h2>

  </div>

  <div class="gallery-container">

    <!-- LEFT BUTTON -->

    <button class="gallery-btn prv">
      <i class="fa-solid fa-chevron-left"></i>
    </button>

    <!-- IMAGE -->

    <div class="gallery-image">

      <img
        id="sliderImag"
        src="./gallery1.jpeg"
        alt=""
      />

    </div>

    <!-- RIGHT BUTTON -->

    <button class="gallery-btn nxt">
      <i class="fa-solid fa-chevron-right"></i>
    </button>

  </div>

</section>

</section>
<script src="comm.js"></script>
</body>
</html>
