<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Admin Dashboard
  </title>

  <!-- FONT AWESOME -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <link
    rel="stylesheet"
    href="admin.css"
  >

</head>

<body>

  <section class="admin-section">

    <div class="admin-container">

      <div class="admin-header">

        <p class="section-tag">
          ADMIN PANEL
        </p>

        <h1>
          Upload Media Content
        </h1>

        <p>
          Upload pictures and videos
          to display on the public media page.
        </p>

      </div>

      <!-- FORM -->

      <form id="uploadForm">

        <!-- TITLE -->

        <div class="input-group">

          <label>
            Media Title
          </label>

          <input
            type="text"
            id="mediaTitle"
            placeholder="Enter title..."
            required
          >

        </div>

        <!-- DESCRIPTION -->

        <div class="input-group">

          <label>
            Description
          </label>

          <textarea
            id="mediaDescription"
            placeholder="Write description..."
            required
          ></textarea>

        </div>

        <!-- FILE -->

        <div class="input-group">

          <label>
            Upload Image / Video
          </label>

          <input
            type="file"
            id="mediaFile"
            accept="image/*,video/*"
            required
          >

        </div>

        <!-- BUTTON -->

        <button type="submit">

          <i class="fa-solid fa-cloud-arrow-up"></i>

          Upload Media

        </button>

      </form>

    </div>

  </section>

  <script src="admin.js"></script>

</body>
</html>
</body>
</html>
